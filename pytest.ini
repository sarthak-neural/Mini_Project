# Pytest configuration file

[pytest]
testpaths = .
python_files = tests.py test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

markers =
    auth: Authentication tests
    user: User profile tests
    settings: User settings tests
    recovery: Password recovery tests
    dashboard: Dashboard tests
    sales: Sales record tests
    alerts: Alert tests
    location: Location and unit tests
    forecast: Forecast tests
    error: Error handling tests
    performance: Performance tests
    security: Security tests
    slow: Slow running tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage options
[coverage:run]
branch = True
omit =
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

precision = 2
skip_covered = False
